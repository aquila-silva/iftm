<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="author" content="Aquila Fernando Alves Silva">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
<fieldset style="color: blue">
    <p><label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required></p>

    <p>Sexo:

        <input type="radio" id="masculino" name="genero">
    <label for="masculino">Masulino</label>
  
    <input type="radio" id="feminino" name="genero">
    <label for="feminino">Feminino</label></p>
   
    <p><label for="estado-civil">Estado Civil:</label>
    <select id="estado-civil" name="estado-civil">
        <option value="option">Selecione uma opção.</option>
        <option value="solteiro">Solteiro</option>
        <option value="casado">Casado</option>
        <option value="divorciado">Solteiro</option>
        <option value="viuvo">viuvo</option>
        <option value="separado">Solteiro</option>
        <option value="">Casado</option></p>

    </select>
    
    <p><label for="email">Email:</label>
    <input type="email" id="email" name="email" required></p>  
   
    <p><label for="endereço">Endereço:</label>
    <input type="text" id="endereço" name="endereço" required></p>

    <p><label for="numero">Número:</label>
    <input type="number" id="numero" name="numero" min="1" step="1" required></p>
    
    
</body>
</html>
