<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="author" content="Aquila Fernando Alves Silva">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <fieldset style="color: blue; width: 500px; background-color:rgba(255, 252, 213, 0.651);">
        <h1>Preencha o Formulário</h1>
        <form action="">
            <p>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </p>

            <p>
                Sexo:
                <input type="radio" id="masculino" name="genero" required>
                <label for="masculino">Masculino</label>
                <input type="radio" id="feminino" name="genero">
                <label for="feminino">Feminino</label>
            </p>

            <p>
                <label for="estado-civil">Estado Civil:</label>
                <select id="estado-civil" name="estado-civil">
                    <option value="" disabled selected>Selecione uma opção.</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="casado">Casado</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="viuvo">Viúvo</option>
                    <option value="separado">Separado</option>
                </select>
            </p>

            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </p>  

            <p>
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>
            </p>

            <p>
                <label for="numero">Número:</label>
                <input type="number" id="numero" name="numero" min="1" step="1" required>
            </p>

            <p>
                <label for="data-nascimento">Data de Nascimento:</label>
                <input type="date" name="data-nascimento" id="data-nascimento">
            </p>

            <p>
                <label for="tel">Telefone:</label>
                <input type="tel" name="tel" id="tel" required placeholder="(00) 90000-0000" minlength="10" maxlength="15">
            </p>

            <p>
                <label for="pagina-pessoal">Página Pessoal:</label>
                <input type="url" name="pagina-pessoal" id="pagina-pessoal">
            </p>    

            <button type="submit">Enviar</button>
            <button type="reset">Limpar Formulário</button>
        </form>    
    </fieldset>
</body>
</html>
